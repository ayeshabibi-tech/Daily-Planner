<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Daily Planner</title>

<link href="https://fonts.googleapis.com/css2?family=Pacifico&family=Caveat&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container py-5">

    <!-- HEADER -->
    <div class="text-center mb-4">
        <h1 class="main-title">My Daily Planner</h1>
        <p class="subtitle">💜 Plan & Pray 💜</p>
    </div>

    <!-- TO DO -->
    <div class="card custom-card mb-4 p-3">
        <h4>📝 To-Do List</h4>

        <div class="input-group my-3">
            <input type="text" id="taskInput" class="form-control" placeholder="Add your task...">
            <button class="btn btn-custom" onclick="addTask()">Add</button>
        </div>

        <ul id="taskList" class="list-group"></ul>
    </div>

    <!-- PRAYER -->
    <div class="card custom-card p-3">
        <h4>🕌 Prayer Tracker</h4>

        <ul class="list-group mt-3">

            <li class="list-group-item d-flex justify-content-between">
                Fajr
                <button class="btn btn-sm btn-outline-dark" onclick="togglePrayer(this)">Done</button>
            </li>

            <li class="list-group-item d-flex justify-content-between">
                Dhuhr
                <button class="btn btn-sm btn-outline-dark" onclick="togglePrayer(this)">Done</button>
            </li>

            <li class="list-group-item d-flex justify-content-between">
                Asr
                <button class="btn btn-sm btn-outline-dark" onclick="togglePrayer(this)">Done</button>
            </li>

            <li class="list-group-item d-flex justify-content-between">
                Maghrib
                <button class="btn btn-sm btn-outline-dark" onclick="togglePrayer(this)">Done</button>
            </li>

            <li class="list-group-item d-flex justify-content-between">
                Isha
                <button class="btn btn-sm btn-outline-dark" onclick="togglePrayer(this)">Done</button>
            </li>

        </ul>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
